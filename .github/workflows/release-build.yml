name: Verify Release Build

on:
  release:
    types: [published]

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install hatch dependencies
        run: |
          python -m pip install --upgrade pip
          pip install hatch

      - name: Build package
        run: hatch build

      - name: Verify built wheel contents
        run: |
          python - <<'PY'
          import pathlib
          import zipfile

          wheels = sorted(pathlib.Path("dist").glob("sheetforge_mcp-*.whl"))
          assert wheels, "No wheel produced in dist/"
          with zipfile.ZipFile(wheels[-1]) as wheel:
              members = set(wheel.namelist())
          assert "excel_mcp/__main__.py" in members, "Built wheel is missing excel_mcp package files"
          PY
